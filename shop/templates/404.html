{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée - 404</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            text-align: center;
            padding: 100px 20px;
        }
        .error-container h1 {
            font-size: 8rem;
            font-weight: bold;
            color: #dc3545;
        }
        .error-container h3 {
            margin-top: 20px;
            font-weight: bold;
        }
        .error-container p {
            margin-top: 10px;
            font-size: 1.2rem;
        }
        .btn-home {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="error-container">
    <h1>404</h1>
    <h3>Oops ! Page non trouvée</h3>
    <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <a href="{% url 'home' %}" class="btn btn-primary btn-lg btn-home">
        <i class="bi bi-house-fill me-2"></i> Retour à l'accueil
    </a>
</div>

</body>
</html>
