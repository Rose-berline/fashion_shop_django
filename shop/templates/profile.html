{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow p-4">

        <h3 class="text-center mb-4">Mon Profil</h3>

        <div class="mb-3">
          <label class="form-label fw-bold">Nom d'utilisateur :</label>
          <p class="form-control">{{ user.username }}</p>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Email :</label>
          <p class="form-control">{{ user.email }}</p>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Date d'inscription :</label>
          <p class="form-control">{{ user.date_joined|date:"d M Y H:i" }}</p>
        </div>

        <div class="text-center mt-4">
          <a href="{% url 'dashboard' %}" class="btn btn-dark w-100">Retour au Dashboard</a>
        </div>

      </div>

    </div>

  </div>

</div>

{% endblock %}
