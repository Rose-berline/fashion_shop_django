{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

  <h2 class="mb-4">Gestion des catégories</h2>

  <!-- Formulaire ajout / modification -->
  <div class="row mb-4">
    <div class="col-md-6">
      <form method="POST">
        {% csrf_token %}
        <div class="input-group">
          {{ form.name }}
          <button class="btn btn-dark" type="submit">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Liste des catégories -->
  <table class="table table-striped">
    <thead class="table-dark">
      <tr>
        <th>Nom</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for cat in categories %}
      <tr>
        <td>{{ cat.name }}</td>
        <td>
          <a href="{% url 'category_update' cat.id %}" class="btn btn-sm btn-warning">Modifier</a>
          <a href="{% url 'category_delete' cat.id %}" class="btn btn-sm btn-danger">Supprimer</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2" class="text-center">Aucune catégorie disponible</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <div class="mt-3">
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Retour au Dashboard</a>
  </div>

</div>

{% endblock %}
