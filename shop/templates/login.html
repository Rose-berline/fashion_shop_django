{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4">
        <h3 class="text-center mb-4">Connexion</h3>

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label>Nom utilisateur</label>
            <input type="text" name="username" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <button class="btn btn-dark w-100">Se connecter</button>
        </form>

        <hr>

        <a href="/accounts/google/login/" class="btn btn-danger w-100">
          <i class="bi bi-google"></i> Se connecter avec Google
        </a>

        <p class="text-center mt-3">
          Pas de compte ? <a href="{% url 'register' %}">Créer un compte</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
